name: Attack Surface Mapping (Authorized Scans Only)

on:
  workflow_dispatch:
    inputs:
      target_domain:
        description: 'Target Domain (MUST BE AUTHORIZED)'
        required: true
        type: string

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap jq

      - name: Install Subfinder
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Prepare Targets List
        run: |
          # Explicitly add the main domain to the target list first
          echo "${{ github.event.inputs.target_domain }}" > all_targets.txt

      - name: Enumerate Subdomains
        run: |
          # Find subdomains and append them to the target list
          subfinder -d ${{ github.event.inputs.target_domain }} -silent -o subdomains.txt
          if [ -s subdomains.txt ]; then
            cat subdomains.txt >> all_targets.txt
          fi
          
          # Remove any potential duplicates
          sort -u all_targets.txt -o all_targets.txt
          
          echo "Final target list for scanning:"
          cat all_targets.txt

      - name: Port Scan All Targets
        run: |
          # Scan the main domain and all discovered subdomains
          nmap -iL all_targets.txt -F -oN nmap_results.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: recon-results
          path: |
            all_targets.txt
            nmap_results.txt
